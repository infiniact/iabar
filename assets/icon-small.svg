  <!-- IABar mark, simplified for tiny sizes (16/32px toolbar). Same browser
       bubble — royal blue header + white body + royal blue border — but the
       traffic-light dots are dropped and the AI spark is enlarged to be the
       hero, so the mark stays legible when the detail collapses. -->
