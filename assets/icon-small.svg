<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- IABar mark, simplified for tiny sizes (16/32px toolbar). Same browser
       bubble — Apple-blue header + white body + Apple-blue border — but the
       traffic-light dots are dropped and the AI spark is enlarged to be the
       hero, so the mark stays legible when the detail collapses. -->
  <defs>
    <clipPath id="bub">
      <path d="M30 8 H98 A22 22 0 0 1 120 30 V82 A22 22 0 0 1 98 104 H60 L40 123 L52 104 H30 A22 22 0 0 1 8 82 V30 A22 22 0 0 1 30 8 Z"/>
    </clipPath>
    <linearGradient id="cb" x1="64" y1="8" x2="64" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5BB0FF"/><stop offset="1" stop-color="#0A6CE6"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#bub)">
    <rect x="0" y="0" width="128" height="128" fill="#ffffff"/>
    <rect x="0" y="0" width="128" height="34" fill="url(#cb)"/>
  </g>

  <path d="M30 8 H98 A22 22 0 0 1 120 30 V82 A22 22 0 0 1 98 104 H60 L40 123 L52 104 H30 A22 22 0 0 1 8 82 V30 A22 22 0 0 1 30 8 Z" fill="none" stroke="#0A84FF" stroke-width="5" stroke-linejoin="round"/>

  <path d="M64 47 C66.3 67.3 71.5 73.1 93 76 C71.5 78.9 66.3 84.7 64 105 C61.7 84.7 56.5 78.9 35 76 C56.5 73.1 61.7 67.3 64 47 Z" fill="#0A84FF"/>
</svg>
