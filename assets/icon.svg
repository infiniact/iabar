<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- IABar mark: the chat bubble IS the icon (no background badge). A browser
       window — Apple-blue title bar with red/yellow/green traffic-light dots —
       over a white body holding a Apple-blue AI spark, with a chat tail. A
       Apple-blue outline (same as the title bar) defines the white body on light
       backgrounds and blends into the header at the top. -->
  <defs>
    <clipPath id="bub">
      <path d="M30 8 H98 A22 22 0 0 1 120 30 V82 A22 22 0 0 1 98 104 H60 L40 123 L52 104 H30 A22 22 0 0 1 8 82 V30 A22 22 0 0 1 30 8 Z"/>
    </clipPath>
    <linearGradient id="cb" x1="64" y1="8" x2="64" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5BB0FF"/><stop offset="1" stop-color="#0A6CE6"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#bub)">
    <rect x="0" y="0" width="128" height="128" fill="#ffffff"/>
    <rect x="0" y="0" width="128" height="40" fill="url(#cb)"/>
  </g>

  <path d="M30 8 H98 A22 22 0 0 1 120 30 V82 A22 22 0 0 1 98 104 H60 L40 123 L52 104 H30 A22 22 0 0 1 8 82 V30 A22 22 0 0 1 30 8 Z" fill="none" stroke="#0A84FF" stroke-width="4" stroke-linejoin="round"/>

  <circle cx="28" cy="24" r="5.5" fill="#FF5F57"/>
  <circle cx="46" cy="24" r="5.5" fill="#FEBC2E"/>
  <circle cx="64" cy="24" r="5.5" fill="#28C840"/>

  <path d="M64 48 C66.2 66.9 71 72.3 91 75 C71 77.7 66.2 83.1 64 102 C61.8 83.1 57 77.7 37 75 C57 72.3 61.8 66.9 64 48 Z" fill="#0A84FF"/>
</svg>
