<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- IABar mark: the chat bubble IS the icon (no background badge). A browser
       window — azure title bar with red/yellow/green traffic-light dots — over a
       warm gold→orange→magenta body holding a big white AI spark, with a chat
       tail. -->
  <defs>
    <clipPath id="bub">
      <path d="M30 8 H98 A22 22 0 0 1 120 30 V82 A22 22 0 0 1 98 104 H60 L40 123 L52 104 H30 A22 22 0 0 1 8 82 V30 A22 22 0 0 1 30 8 Z"/>
    </clipPath>
    <linearGradient id="az" x1="64" y1="8" x2="64" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2f87cf"/><stop offset="1" stop-color="#0e5290"/>
    </linearGradient>
    <linearGradient id="warm" x1="64" y1="40" x2="64" y2="123" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD23A"/><stop offset="0.5" stop-color="#FF7A2F"/><stop offset="1" stop-color="#FF2E8B"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#bub)">
    <rect x="0" y="0" width="128" height="128" fill="url(#warm)"/>
    <rect x="0" y="0" width="128" height="40" fill="url(#az)"/>
  </g>

  <circle cx="28" cy="24" r="5.5" fill="#FF5F57"/>
  <circle cx="46" cy="24" r="5.5" fill="#FEBC2E"/>
  <circle cx="64" cy="24" r="5.5" fill="#28C840"/>

  <path d="M64 44 C66.5 65 72 71 95 74 C72 77 66.5 83 64 104 C61.5 83 56 77 33 74 C56 71 61.5 65 64 44 Z" fill="#ffffff"/>
</svg>
