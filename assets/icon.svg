      <stop offset="0" stop-color="#3E67EE"/><stop offset="1" stop-color="#2148C8"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#bub)">
    <rect x="0" y="0" width="128" height="128" fill="#ffffff"/>
    <rect x="0" y="0" width="128" height="40" fill="url(#cb)"/>
  </g>

