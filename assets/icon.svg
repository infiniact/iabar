<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- IABar mark: the chat bubble IS the icon (no background badge). A browser
       window — cyan-blue title bar with red/yellow/green traffic-light dots —
       over a white body holding a cyan-blue AI spark, with a chat tail. A
       cyan-blue outline (same as the title bar) defines the white body on light
       backgrounds and blends into the header at the top. -->
  <defs>
    <clipPath id="bub">
      <path d="M30 8 H98 A22 22 0 0 1 120 30 V82 A22 22 0 0 1 98 104 H60 L40 123 L52 104 H30 A22 22 0 0 1 8 82 V30 A22 22 0 0 1 30 8 Z"/>
    </clipPath>
    <linearGradient id="cb" x1="64" y1="8" x2="64" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#23B0D2"/><stop offset="1" stop-color="#0E7FA8"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#bub)">
    <rect x="0" y="0" width="128" height="128" fill="#ffffff"/>
    <rect x="0" y="0" width="128" height="40" fill="url(#cb)"/>
  </g>

  <path d="M30 8 H98 A22 22 0 0 1 120 30 V82 A22 22 0 0 1 98 104 H60 L40 123 L52 104 H30 A22 22 0 0 1 8 82 V30 A22 22 0 0 1 30 8 Z" fill="none" stroke="#1597C4" stroke-width="4" stroke-linejoin="round"/>

  <circle cx="28" cy="24" r="5.5" fill="#FF5F57"/>
  <circle cx="46" cy="24" r="5.5" fill="#FEBC2E"/>
  <circle cx="64" cy="24" r="5.5" fill="#28C840"/>

  <path d="M64 44 C66.5 65 72 71 95 74 C72 77 66.5 83 64 104 C61.5 83 56 77 33 74 C56 71 61.5 65 64 44 Z" fill="#1597C4"/>
</svg>
